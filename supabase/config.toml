# SHOPCA — Supabase project configuration
# Managed via `supabase config push --project-ref vvjmcrcakmmjuhpbtzbu`

project_id = "vvjmcrcakmmjuhpbtzbu"

[auth]
site_url = "https://shopca.fr"
additional_redirect_urls = [
  "https://shopca.fr/**",
  "https://www.shopca.fr/**",
  "http://localhost:5173/**",
  "http://localhost:4173/**",
]

# Keep email confirmation ON for security (users must verify their email).
# If you want instant sign-up → dashboard access, set enable_confirmations = false.
[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = true

# Custom SMTP — disabled until a real Resend API key is provided.
# When you have the key, set the RESEND_API_KEY env var locally then
# flip `enabled = true` and run `supabase config push`.
# In the meantime, Supabase's default SMTP is used (3/hour rate limit).
[auth.email.smtp]
enabled = false

# OAuth providers (already configured via dashboard — leave untouched)
